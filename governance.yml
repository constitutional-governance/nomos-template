# Nomos governance configuration
# This file drives all built-in validators.
# Full reference: https://github.com/your-org/nomos

project:
  name: "My Platform Governance"       # TODO: replace
  description: "Platform governance"   # TODO: replace

# ── Kafka domain ───────────────────────────────────────────────────────────────
# Only needed if you use Kafka. Remove this section otherwise.
# These values drive validate_topic_name(), validate_rbac_binding(), validate_sa_name().
#
# kafka:
#   topic:
#     segment_count: 7
#     prefixes: [raw, public, ready, private, dev]
#     non_production_prefixes: [dev]
#     max_length: 249
#   rbac:
#     valid_roles: [DeveloperRead, DeveloperWrite, ResourceOwner, DeveloperManage]
#     valid_resource_types: [topic, group, cluster]
#     admin_roles: [DeveloperManage]
#     admin_resource_types: [cluster]
#     cluster_resource_name: kafka-cluster
#   service_account:
#     prefix: "sa-"
#     valid_envs: [dev, staging, prod]
#     connector_directions: [source, sink]
#     debug_suffix: "debug"

# See examples/kafka/governance.yml for a complete Kafka configuration.

# ── Canary rollout (optional) ──────────────────────────────────────────────────
# Any rule section (kafka.topic, kafka.rbac, kafka.service_account,
# kafka.schema_registry, rest_api, service) can carry a rollout block to
# stage enforcement gradually:
#
#   kafka:
#     topic:
#       segment_count: 7
#       prefixes: [raw, public, ...]
#       rollout:
#         phase: canary          # enforce only for listed teams
#         teams:
#           - payments           # canary teams get errors on violation
#           - platform           # all other teams get warnings instead
#
# When phase is "stable" (or the rollout block is absent), the rule is
# enforced for everyone — this is the default behaviour.
# Switch to "stable" once the rollout is complete to enforce universally.
