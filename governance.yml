# ── Kafka domain ───────────────────────────────────────────────────────────────
# Only needed if you use Kafka. Remove this section otherwise.
# These values drive validate_topic_name(), validate_rbac_binding(), validate_sa_name().
#
# kafka:
#   topic:
#     segment_count: 7
#     prefixes: [raw, public, ready, private, dev]
#     non_production_prefixes: [dev]
#     max_length: 249
#   rbac:
#     valid_roles: [DeveloperRead, DeveloperWrite, ResourceOwner, DeveloperManage]
#     valid_resource_types: [topic, group, cluster]
#     admin_roles: [DeveloperManage]
#     admin_resource_types: [cluster]
#     cluster_resource_name: kafka-cluster
#   service_account:
#     prefix: "sa-"
#     valid_envs: [dev, staging, prod]
#     connector_directions: [source, sink]
#     debug_suffix: "debug"

