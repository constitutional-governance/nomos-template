# Nomos governance configuration
# This file drives all validators. Edit it to match your platform's conventions.
# Full reference: https://github.com/your-org/nomos

project:
  name: "My Platform Governance"       # TODO: replace with your organization name
  description: "Platform governance"   # TODO: replace with a short description

# ── Kafka domain ───────────────────────────────────────────────────────────────
# Remove this section if your platform does not use Kafka.
kafka:
  topic:
    segment_count: 7                  # TODO: set your required segment count
    prefixes:
      - raw                           # TODO: replace with your valid prefixes
      - public
      - ready
      - private
      - dev
    non_production_prefixes:
      - dev
    max_length: 249

  rbac:
    valid_roles:
      - DeveloperRead                 # TODO: replace with your RBAC role names
      - DeveloperWrite
      - ResourceOwner
      - DeveloperManage
    valid_resource_types:
      - topic
      - group
      - cluster
    admin_roles:
      - DeveloperManage
    admin_resource_types:
      - cluster
    cluster_resource_name: kafka-cluster

  service_account:
    prefix: "sa-"                     # TODO: set your SA prefix
    valid_envs:
      - dev                           # TODO: set your environment names
      - staging
      - prod
    connector_directions:
      - source
      - sink
    debug_suffix: "debug"

